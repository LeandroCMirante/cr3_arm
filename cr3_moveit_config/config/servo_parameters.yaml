/**/servo_node:
  ros__parameters:
    moveit_servo:
      command_in_type: "unitless"

      scale:
        linear: 1.0
        rotational: 1.2
        joint: 0.5

      publish_period: 0.02
      low_latency_mode: true
      incoming_command_timeout: 0.1
      num_outgoing_halt_msgs_to_publish: 4

      command_out_type: trajectory_msgs/JointTrajectory
      command_out_topic: /cr3_arm_controller/joint_trajectory

      publish_joint_positions: true
      publish_joint_velocities: true
      publish_joint_accelerations: false

      # Se o move_group já é o monitor principal da cena, deixe false
      is_primary_planning_scene_monitor: false

      move_group_name: cr3_arm
      planning_frame: world

      ee_frame_name: gripper_body_link
      # este frame precisa ser um LINK do robô; base_link é mais seguro para começar
      robot_link_command_frame: base_link

      lower_singularity_threshold: 30.0
      hard_stop_singularity_threshold: 50.0
      leaving_singularity_threshold_multiplier: 2.0

      joint_limit_margin: 0.1

      check_collisions: true
      collision_check_rate: 10.0
      self_collision_proximity_threshold: 0.01
      scene_collision_proximity_threshold: 0.02

      cartesian_command_in_topic: /servo_node/delta_twist_cmds
      joint_command_in_topic: /servo_node/delta_joint_cmds
      status_topic: /servo_node/status